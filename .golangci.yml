version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
  disable:
    - depguard
  settings:
    gocritic:
      disabled-checks:
        - appendAssign
    staticcheck:
      checks:
        - "all"
        - "-SA1019"
        - "-ST1000"
        - "-ST1020"
        - "-QF1008"
  exclusions:
    rules:
      - linters: [godot, godox]
        text: "TODO"
      - linters: [staticcheck]
        text: "SA1019"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/beepxtra/steroid-core4.0
